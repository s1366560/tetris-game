kind: pipeline
type: docker
name: tetris-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main
    - master

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f backend/package.json
      - test -f frontend/package.json

  - name: backend-build
    image: node:20-alpine
    commands:
      - cd backend
      - npm install
      - npm run build

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install
      - npm run build

  - name: docker-build
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker build -t tetris-backend:drone -f backend/Dockerfile ./backend
      - docker build -t tetris-frontend:drone -f frontend/Dockerfile ./frontend

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker compose down || true
      - docker compose up -d
      - sleep 10
      - docker ps -a
      - docker compose logs
      - wget -qO- http://host.docker.internal:3001/health || exit 1

  - name: health-check
    image: alpine:latest
    commands:
      - apk add --no-cache wget
      - curl http://host.docker.internal:3001/health
      - curl http://host.docker.internal:3001/api/leaderboard

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
