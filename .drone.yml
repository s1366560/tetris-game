kind: pipeline
type: docker
name: tetris-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main
    - master

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f backend/package.json
      - test -f frontend/package.json
      - echo "OK"

  - name: backend-build
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker build -t tetris-backend:drone -f backend/Dockerfile ./backend
      - docker build -t tetris-frontend:drone -f frontend/Dockerfile ./frontend
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker compose down || true
      - docker compose up -d
      - sleep 5
      - docker ps
      - docker compose logs
      - for i in $(seq 1 30); do wget -qO- http://host.docker.internal:3001/health && break || sleep 2; done
      - wget -v http://host.docker.internal:3001/health || exit 1
    when:
      event:
        - push
        - custom

  - name: health-check
    image: alpine:latest
    commands:
      - apk add --no-cache wget
      - curl -sf http://host.docker.internal:3001/health
      - curl -sf http://host.docker.internal:3001/api/leaderboard
    when:
      event:
        - push
        - custom

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
