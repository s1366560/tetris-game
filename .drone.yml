kind: pipeline
type: docker
name: tetris-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main
    - master

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f backend/package.json
      - test -f frontend/package.json
      - echo "OK"

  - name: backend-build
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker build -t tetris-backend:drone -f backend/Dockerfile ./backend
      - docker build -t tetris-frontend:drone -f frontend/Dockerfile ./frontend
      - docker images | grep tetris
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - echo "Stopping existing containers..."
      - docker compose down || true
      - echo "Starting containers..."
      - docker compose up -d
      - echo "Waiting 10 seconds for containers to start..."
      - sleep 10
      - echo "Container status:"
      - docker ps -a --filter name=tetris
      - echo "Container logs (my-evo-app):"
      - docker compose logs my-evo-app 2>&1 || true
      - echo "Container logs (all):"
      - docker compose logs 2>&1 || true
      - echo "Attempting health check..."
      - for i in $(seq 1 30); do
          echo "Health check attempt $i/30..."
          RESULT=$(wget -qO- http://host.docker.internal:3001/health 2>&1) && echo "Backend responded: $RESULT" && break
          echo "Backend not responding, waiting 2 seconds..."
          sleep 2
        done
      - echo "Final health check:"
      - wget -v http://host.docker.internal:3001/health 2>&1 || echo "HEALTH CHECK FAILED - see logs above"
      - echo "Done!"
    when:
      event:
        - push
        - custom

  - name: health-check
    image: alpine:latest
    commands:
      - apk add --no-cache wget
      - curl -sf http://host.docker.internal:3001/health || echo "Backend check failed"
      - curl -sf http://host.docker.internal:3001/api/leaderboard || echo "API check failed"
    when:
      event:
        - push
        - custom

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
