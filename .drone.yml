kind: pipeline
type: docker
name: tetris-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main
    - master

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f backend/package.json
      - test -f frontend/package.json

  - name: backend-build
    image: node:20-alpine
    commands:
      - cd backend
      - npm install
      - npm run build

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install
      - npm run build

  - name: docker-build
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker build -t tetris-backend:drone -f backend/Dockerfile ./backend
      - docker build -t tetris-frontend:drone -f frontend/Dockerfile ./frontend

  - name: deploy
    image: docker:cli
    network_mode: host
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - echo "Docker version"
      - docker version
      - echo "Stopping old containers"
      - docker stop tetris-app tetris-frontend 2>/dev/null || true
      - docker rm tetris-app tetris-frontend 2>/dev/null || true
      - echo "Listing images"
      - docker images tetris-backend
      - docker images tetris-frontend
      - echo "Starting backend"
      - docker run -d --network host --name tetris-app --restart unless-stopped tetris-backend:drone
      - echo "Starting frontend"
      - docker run -d --network host --name tetris-frontend --restart unless-stopped tetris-frontend:drone
      - echo "Running containers"
      - docker ps -a
      - echo "Container logs"
      - docker logs tetris-app 2>&1 | tail -20 || true
      - docker logs tetris-frontend 2>&1 | tail -20 || true
      - echo "Waiting 15s for startup"
      - sleep 15
      - echo "Health check"
      - wget -qO- http://127.0.0.1:3001/health
      - wget -qO- http://127.0.0.1:3000/ || echo "frontend not reachable"

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
